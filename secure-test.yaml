apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-deployment
  namespace: security-operator-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insecure-deployment
  template:
    metadata:
      labels:
        app: insecure-deployment
    spec:
      serviceAccountName: dedicated-sa
      containers:
        - name: web
          image: nginx:1.25
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dedicated-sa
  namespace: security-operator-demo
