apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - namespaces
      - pods
      - services
      - serviceaccounts
      - secrets
      - configmaps
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - networking.k8s.io
    resources:
      - networkpolicies
      - ingresses
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - cilium.io
    resources:
      - ciliumnetworkpolicies
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - traefik.io
    resources:
      - ingressroutes
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - security.meslami.io
    resources:
      - securitypolicyprofiles
      - namespacesecurityreports
      - securityfindings
      - securityremediations
    verbs:
      - get
      - list
      - watch
      - create
      - patch
      - update
      - delete

  - apiGroups:
      - security.meslami.io
    resources:
      - namespacesecurityreports/status
      - securityfindings/status
      - securityremediations/status
    verbs:
      - get
      - patch
      - update