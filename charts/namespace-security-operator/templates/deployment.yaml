apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.operator.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WATCH_NAMESPACES
              value: {{ .Values.operator.watchNamespaces | quote }}

            - name: EXCLUDE_NAMESPACES
              value: {{ .Values.operator.excludeNamespaces | quote }}

            - name: DIRTY_EVENT_THRESHOLD
              value: {{ .Values.operator.dirtyEventThreshold | quote }}

            - name: DIRTY_FLUSH_SECONDS
              value: {{ .Values.operator.dirtyFlushSeconds | quote }}

            - name: DIRTY_WORKER_INTERVAL_SECONDS
              value: {{ .Values.operator.dirtyWorkerIntervalSeconds | quote }}

            - name: RETRY_BACKOFF_SECONDS
              value: {{ .Values.operator.retryBackoffSeconds | quote }}

            - name: FULL_RESYNC_SECONDS
              value: {{ .Values.operator.fullResyncSeconds | quote }}

            - name: RESOLVED_FINDING_RETENTION_DAYS
              value: {{ .Values.operator.resolvedFindingRetentionDays | quote }}

            - name: LOG_LEVEL
              value: {{ .Values.operator.logLevel | quote }}

          resources:
{{ toYaml .Values.resources | indent 12 }}