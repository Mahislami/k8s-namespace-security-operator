apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespacesecurityreports.security.meslami.io
spec:
  group: security.meslami.io
  scope: Namespaced
  names:
    plural: namespacesecurityreports
    singular: namespacesecurityreport
    kind: NamespaceSecurityReport
    shortNames:
      - nssecreport
      - nsr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - namespace
              properties:
                namespace:
                  type: string
                profile:
                  type: string
            status:
              type: object
              properties:
                namespace:
                  type: string
                score:
                  type: integer
                  minimum: 0
                  maximum: 100
                posture:
                  type: string
                  enum:
                    - Healthy
                    - Moderate
                    - Risky
                    - Critical
                eventMode:
                  type: boolean
                totalFindingsEvaluated:
                  type: integer
                  minimum: 0
                findingsBySeverity:
                  type: object
                  properties:
                    critical:
                      type: integer
                      minimum: 0
                    high:
                      type: integer
                      minimum: 0
                    medium:
                      type: integer
                      minimum: 0
                    low:
                      type: integer
                      minimum: 0
                    info:
                      type: integer
                      minimum: 0
                topRecommendations:
                  type: array
                  items:
                    type: string
                lastUpdated:
                  type: string
                monitoringModel:
                  type: string
                scalabilityNote:
                  type: string
      subresources:
        status: {}
