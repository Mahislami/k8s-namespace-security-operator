apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securityremediations.security.meslami.io
spec:
  group: security.meslami.io
  scope: Namespaced
  names:
    plural: securityremediations
    singular: securityremediation
    kind: SecurityRemediation
    shortNames:
      - secrem
      - sr
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Finding
          type: string
          jsonPath: .spec.findingRef
        - name: Action
          type: string
          jsonPath: .spec.actionType
        - name: Risk
          type: string
          jsonPath: .spec.risk
        - name: State
          type: string
          jsonPath: .status.state
        - name: FindingState
          type: string
          jsonPath: .status.findingState
          priority: 1
        - name: Updated
          type: string
          jsonPath: .status.lastUpdated
          priority: 1
        - name: ResolvedAt
          type: string
          jsonPath: .status.resolvedAt
          priority: 1
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - findingRef
                - mode
                - actionType
                - description
              properties:
                findingRef:
                  type: string
                mode:
                  type: string
                  enum:
                    - suggest
                    - manual
                actionType:
                  type: string
                  enum:
                    - manifest-patch
                    - command
                    - documentation
                    - network-policy
                    - service-account-change
                description:
                  type: string
                command:
                  type: string
                patch:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                risk:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
            status:
              type: object
              properties:
                state:
                  type: string
                  enum:
                    - Active
                    - Resolved
                findingState:
                  type: string
                  enum:
                    - Active
                    - Resolved
                createdAt:
                  type: string
                lastUpdated:
                  type: string
                resolvedAt:
                  type: string
                  nullable: true
                resolutionReason:
                  type: string
                  nullable: true
      subresources:
        status: {}
