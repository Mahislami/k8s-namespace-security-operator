apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securitypolicyprofiles.security.meslami.io
spec:
  group: security.meslami.io
  scope: Namespaced
  names:
    plural: securitypolicyprofiles
    singular: securitypolicyprofile
    kind: SecurityPolicyProfile
    shortNames:
      - secprofile
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                severityThreshold:
                  type: string
                  enum: [critical, high, medium, low]
                  default: medium
                rules:
                  type: object
                  properties:
                    requirePodSecurityRestricted:
                      type: boolean
                      default: true
                    forbidPrivilegedContainers:
                      type: boolean
                      default: true
                    forbidHostNetwork:
                      type: boolean
                      default: true
                    forbidHostPID:
                      type: boolean
                      default: true
                    forbidHostPath:
                      type: boolean
                      default: true
                    requireRunAsNonRoot:
                      type: boolean
                      default: true
                    forbidLatestImageTag:
                      type: boolean
                      default: true
                    flagDefaultServiceAccount:
                      type: boolean
                      default: true
                    requireReadinessProbe:
                      type: boolean
                      default: true
                    requireLivenessProbe:
                      type: boolean
                      default: false
                    requireResourceRequests:
                      type: boolean
                      default: true
                    requireResourceLimits:
                      type: boolean
                      default: true
                    requireDeploymentReplicas:
                      type: boolean
                      default: true
                    minimumDeploymentReplicas:
                      type: integer
                      minimum: 1
                      default: 2
                    requireRollingUpdateStrategy:
                      type: boolean
                      default: true
                    requireNetworkPolicy:
                      type: boolean
                      default: true
                    requireCiliumNetworkPolicy:
                      type: boolean
                      default: false
                    forbidClusterAdminRoleBinding:
                      type: boolean
                      default: true
                    forbidWildcardRBAC:
                      type: boolean
                      default: true
                    flagDefaultServiceAccountRBAC:
                      type: boolean
                      default: true
                    flagLoadBalancerServices:
                      type: boolean
                      default: true
                    flagNodePortServices:
                      type: boolean
                      default: true
                    flagSensitiveExposedPorts:
                      type: boolean
                      default: true
                    requireIngressTLS:
                      type: boolean
                      default: true
                    requireTraefikIngressRouteTLS:
                      type: boolean
                      default: true
